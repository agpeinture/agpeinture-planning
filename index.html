<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AG Planning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#3DB8D4;
  --brand-dark:#2980b9;
  --brand-bg:#E8F5FA;
  --brand-soft:#F5FBFD;
  --dark:#0a3d4f;
  --nav:#062d3a;
  --bg:#f8fafc;
  --text:#1a3645;
  --muted:#7a8c97;
  --border:#e8eef2;
  --green:#27ae60;
  --orange:#f39c12;
  --red:#e74c3c;
  --shadow:0 1px 3px rgba(0,30,50,0.06);
  --shadow-md:0 4px 16px rgba(0,30,50,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER (light, épuré) */
.hdr{background:white;border-bottom:1px solid var(--border)}
.hdr-top{padding:0 18px;display:flex;align-items:center;justify-content:space-between;height:68px;gap:8px}
.hdr-l{display:flex;align-items:center;gap:12px;min-width:0}
.hdr-logo-img{height:42px;width:auto;object-fit:contain;flex-shrink:0}
.hdr-logo{width:42px;height:42px;background:var(--brand);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;color:white;font-size:14px;letter-spacing:0.5px;flex-shrink:0;font-family:'Montserrat',sans-serif}
.hdr-divider{width:1px;height:32px;background:var(--border);flex-shrink:0}
.hdr-titles{min-width:0}
.hdr-title{font-family:'Montserrat',sans-serif;color:var(--text);font-weight:800;font-size:14px;letter-spacing:0.3px;line-height:1.2}
.hdr-sub{color:var(--muted);font-size:11px;font-weight:500;margin-top:2px}
.hdr-r{display:flex;gap:6px;align-items:center;flex-shrink:0}
.hbtn{border:none;border-radius:10px;padding:9px 13px;cursor:pointer;font-size:11px;font-weight:700;font-family:'Inter',sans-serif;white-space:nowrap;transition:all 0.15s}
.hbtn-print{background:var(--brand-bg);color:var(--brand);border:1px solid transparent}
.hbtn-print:active{background:var(--brand-soft)}
.hbtn-add{background:var(--brand);color:white}
.hbtn-add:active{background:var(--brand-dark)}
.hbtn-add2{background:white;color:var(--text);border:1px solid var(--border)}
.hbtn-add2:active{background:var(--bg)}
.hdr-tabs{display:flex;padding:0 18px;border-top:1px solid var(--border);overflow-x:auto;scrollbar-width:none;background:white}
.hdr-tabs::-webkit-scrollbar{display:none}
.htab{display:flex;align-items:center;gap:8px;padding:14px 18px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);cursor:pointer;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;white-space:nowrap;transition:all 0.15s}
.htab.active{color:var(--brand);border-bottom-color:var(--brand);font-weight:700}
.htab .ico{font-size:14px}

/* WEEK NAV BAR (épuré, fond clair) */
.weeknav{background:white;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);gap:8px}
.wnav-btn{background:white;border:1px solid var(--border);color:var(--text);border-radius:10px;padding:9px 14px;cursor:pointer;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;white-space:nowrap;transition:all 0.15s}
.wnav-btn:active{background:var(--bg);border-color:var(--brand);color:var(--brand)}
.wnav-info{text-align:center;flex:1;min-width:0}
.wnav-title{font-family:'Montserrat',sans-serif;color:var(--text);font-weight:700;font-size:13px;line-height:1.3}
.wnav-today{background:transparent;border:none;color:var(--brand);cursor:pointer;font-size:11px;text-decoration:none;margin-top:3px;font-family:'Inter',sans-serif;font-weight:600}

/* MAIN CONTENT */
.main{padding:20px 14px}
.cloud-row{display:flex;justify-content:flex-end;gap:6px;margin-bottom:14px;align-items:center}
.cb{border:none;border-radius:18px;padding:7px 13px;font-size:11px;font-weight:700;cursor:pointer;color:white;font-family:'Inter',sans-serif}
.cb-load{background:var(--brand)}
.cb-save{background:var(--green)}
.fb-stat{font-size:11px;font-weight:600;color:var(--green);align-self:center;margin-right:auto;padding-left:4px}

/* WORKER CHIPS */
.workers-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.wchip{display:flex;align-items:center;gap:8px;background:white;border-radius:24px;padding:5px 14px 5px 5px;border:1px solid var(--border);cursor:pointer;transition:all 0.15s}
.wchip:active{transform:scale(0.97);border-color:var(--brand)}
.wdot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;flex-shrink:0;font-family:'Inter',sans-serif;letter-spacing:0.3px}
.wname{font-size:13px;font-weight:600;color:var(--text)}
.wdays{font-size:11px;font-weight:700;color:var(--brand);background:var(--brand-bg);padding:2px 7px;border-radius:10px}
.wchip-add{background:white;color:var(--brand);border:1.5px dashed var(--brand);font-weight:700;padding:7px 14px}

/* TABLE GRID — épuré, plus d'air */
.tgrid-wrap{background:white;border-radius:14px;overflow:hidden;border:1px solid var(--border);margin-bottom:16px}
.tgrid{display:grid;grid-template-columns:170px repeat(6,minmax(80px,1fr));min-width:100%}
.tg-hdr{background:var(--bg);padding:14px 14px;display:flex;align-items:center;border-bottom:1px solid var(--border)}
.tg-hdr-lbl{font-family:'Inter',sans-serif;color:var(--muted);font-size:11px;letter-spacing:0.5px;text-transform:uppercase;font-weight:700}
.tg-hdr-day{background:var(--bg);padding:10px 4px;text-align:center;border-bottom:1px solid var(--border);border-left:1px solid var(--border)}
.tg-hdr-day-lbl{font-family:'Inter',sans-serif;color:var(--text);font-size:12px;font-weight:700}
.tg-hdr-day-date{font-size:10px;color:var(--muted);font-weight:500;margin-top:2px}
.tg-row{display:contents}
.tg-c-info{padding:14px 12px;border-bottom:1px solid var(--border);background:white;border-left:3px solid var(--brand);position:relative}
.tg-c-name{font-size:14px;font-weight:700;color:var(--text);font-family:'Inter',sans-serif;line-height:1.25}
.tg-c-addr{font-size:11px;color:var(--muted);margin-top:3px;font-weight:500;line-height:1.3}
.tg-c-bot{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap}
.tg-status{display:inline-block;padding:2px 9px;border-radius:10px;font-size:10px;font-weight:600;font-family:'Inter',sans-serif}
.st-encours{background:var(--brand-bg);color:var(--brand)}
.st-attente{background:#FEF5E7;color:var(--orange)}
.st-termine{background:#E8F8EE;color:var(--green)}
.tg-edit{background:none;border:none;cursor:pointer;font-size:13px;padding:0;color:var(--muted);line-height:1;margin-left:auto}
.tg-edit:active{color:var(--brand)}
.tg-cell{padding:8px 4px;border-bottom:1px solid var(--border);border-left:1px solid var(--border);background:white;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-height:96px;transition:background 0.1s}
.tg-cell:active{background:var(--brand-soft)}
.tg-cell.empty{background:#fcfdfe}
.tg-cell.empty:active{background:var(--brand-soft)}
.tg-add{font-size:22px;color:var(--brand);font-weight:300;line-height:1;border:1.5px dashed rgba(61,184,212,0.4);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;margin-top:22px;opacity:0.6}
.tg-cell-dots{display:flex;flex-direction:column;gap:2px;align-items:center;margin-bottom:4px}
.tg-cdot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:white;font-family:'Inter',sans-serif;border:2px solid white;box-shadow:0 1px 3px rgba(0,30,50,0.12);letter-spacing:0.2px}
.tg-cell-time{font-size:10px;font-weight:600;color:var(--brand);margin-top:auto;font-family:'Inter',sans-serif;line-height:1.1;text-align:center}
.tg-cell-names{font-size:9px;color:var(--muted);text-align:center;font-weight:500;line-height:1.2;margin-top:3px;padding:0 2px;word-break:break-word}

/* EMPTY MSG */
.empty-msg{text-align:center;padding:48px 16px;background:white;border-radius:14px;color:var(--muted);font-weight:600;border:1px solid var(--border);margin-bottom:16px}
.empty-msg .ei{font-size:42px;margin-bottom:12px;opacity:0.5}
.empty-msg p{font-size:15px;color:var(--text);margin-bottom:6px}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,30,50,0.5);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
.overlay.show{display:flex}
.modal{background:white;border-radius:18px 18px 0 0;width:100%;max-width:520px;padding:18px 18px 26px;max-height:90vh;overflow-y:auto;animation:slideUp 0.22s ease-out}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:48px;height:5px;background:#dde4e8;border-radius:3px;margin:-4px auto 14px}
.modal h3{font-size:18px;font-weight:700;color:var(--text);margin-bottom:14px;text-align:center;font-family:'Inter',sans-serif}
.modal h3 .h3-sub{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-top:5px;font-family:'Inter',sans-serif}
.frow{margin-bottom:13px}
.frow label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;font-family:'Inter',sans-serif}
.frow input,.frow select,.frow textarea{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 13px;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;color:var(--text);background:white;outline:none}
.frow input:focus,.frow select:focus,.frow textarea:focus{border-color:var(--brand);background:white}
.frow textarea{min-height:74px;resize:vertical}
.time-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.time-presets{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:4px}
.time-presets button{background:white;border:1.5px solid var(--border);border-radius:10px;padding:9px 6px;font-family:'Inter',sans-serif;font-size:11px;font-weight:700;color:var(--text);cursor:pointer;line-height:1.3}
.time-presets button:active{background:var(--brand-bg);border-color:var(--brand)}
.time-presets button.sel{background:var(--brand);color:white;border-color:var(--brand)}
.time-presets button span{display:block;font-size:10px;font-weight:500;opacity:0.75;margin-top:2px}
.workers-list{display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto;margin-bottom:8px}
.w-pick{display:flex;align-items:center;gap:10px;background:white;border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;cursor:pointer;transition:all 0.15s}
.w-pick.sel{background:var(--brand-bg);border-color:var(--brand)}
.w-pick-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;flex-shrink:0;font-family:'Inter',sans-serif}
.w-pick-name{flex:1;font-size:14px;font-weight:600;color:var(--text)}
.w-pick-check{width:22px;height:22px;border:2px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:white;font-weight:900;color:white}
.w-pick.sel .w-pick-check{background:var(--brand);border-color:var(--brand);font-size:13px}
.mbtns{display:flex;gap:10px;margin-top:14px}
.bcancel,.bsave,.bdel{flex:1;border:none;border-radius:11px;padding:13px;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.bcancel{background:var(--bg);color:var(--muted)}
.bsave{background:var(--brand);color:white}
.bdel{background:var(--red);color:white}
.color-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.color-pick{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all 0.15s}
.color-pick.sel{border-color:var(--text);transform:scale(1.1)}
.status-row{display:flex;gap:6px}
.status-row button{flex:1;background:white;border:1.5px solid var(--border);border-radius:10px;padding:10px;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer}
.status-row button.sel{background:var(--brand);color:white;border-color:var(--brand)}

/* AGENDA EMPTY */
.agenda-empty{padding:48px 24px;text-align:center;background:white;border-radius:14px;border:1px solid var(--border)}
.agenda-empty .ei{font-size:48px;margin-bottom:12px;opacity:0.5}
.agenda-empty p{color:var(--text);font-weight:700;margin-bottom:8px;font-size:16px}
.agenda-empty span{color:var(--muted);font-size:13px;font-weight:500;line-height:1.6}

/* PRINT — version PDF propre */
@media print{
  @page{size:A4 landscape;margin:10mm}
  .noprint{display:none!important}
  body{background:white;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .hdr{background:white!important;border-bottom:2px solid var(--brand)!important;page-break-after:avoid}
  .hdr-top{height:auto;padding:10px 14px}
  .hdr-tabs{display:none!important}
  .weeknav{background:var(--brand-bg)!important;padding:8px 14px;border-bottom:1px solid var(--brand)}
  .wnav-title{color:var(--text)!important;font-size:14px}
  .main{padding:10px 14px;max-width:none}
  .workers-row{margin-bottom:10px;gap:6px}
  .wchip{padding:3px 10px 3px 4px;border:1px solid var(--border)!important;box-shadow:none!important}
  .wdot{width:22px;height:22px;font-size:9px}
  .wname{font-size:11px}
  .wdays{font-size:10px}
  .tgrid-wrap{border:1px solid var(--border)!important;page-break-inside:auto}
  .tgrid{break-inside:auto}
  .tg-row,.tg-c-info,.tg-cell{page-break-inside:avoid;break-inside:avoid}
  .tg-hdr,.tg-hdr-day{background:var(--brand-bg)!important;color:var(--text)!important}
  .tg-hdr-lbl,.tg-hdr-day-lbl{color:var(--text)!important}
  .tg-hdr-day-date{color:var(--muted)!important}
  .tg-cell{min-height:60px;padding:5px 3px}
  .tg-cdot{width:20px;height:20px;font-size:9px;border:1px solid white;box-shadow:none!important}
  .tg-add{display:none}
  .tg-cell.empty{background:#fafafa!important}
  .tg-edit{display:none}
  .agenda-empty{display:none}
  /* Footer print */
  .print-footer{display:block!important;position:fixed;bottom:5mm;left:0;right:0;text-align:center;font-size:9px;color:var(--muted);font-weight:500}
}
.print-footer{display:none}

/* RESPONSIVE */
@media (max-width:600px){
  .hdr-top{height:60px;padding:0 12px}
  .hdr-logo-img{height:36px}
  .hdr-logo{width:36px;height:36px;font-size:12px}
  .hdr-title{font-size:12px}
  .hdr-sub{font-size:10px}
  .hbtn{padding:8px 10px;font-size:10px}
  .hdr-tabs{padding:0 12px}
  .htab{padding:12px 12px;font-size:12px}
  .weeknav{padding:11px 12px;gap:6px}
  .wnav-btn{padding:8px 10px;font-size:11px}
  .wnav-title{font-size:12px}
  .main{padding:14px 10px}
  .tgrid{grid-template-columns:130px repeat(6,minmax(64px,1fr))}
  .tg-c-info{padding:10px 8px}
  .tg-c-name{font-size:12px}
  .tg-c-addr{font-size:10px}
  .tg-cell{padding:6px 2px;min-height:84px}
  .tg-cdot{width:22px;height:22px;font-size:9px}
  .tg-cell-time{font-size:9px}
  .tg-cell-names{font-size:8px}
  .tg-hdr-day-lbl{font-size:11px}
  .tg-hdr-day-date{font-size:9px}
}

@media (min-width:768px){
  .main{padding:24px;max-width:1400px;margin:0 auto}
}
</style>
</head>

<!-- ============ APP ============ -->
<script>
var DAYS=['Lun','Mar','Mer','Jeu','Ven','Sam'];
var DAYS_LONG=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
var MONTHS=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
var MONTHS_SHORT=['janv.','févr.','mars','avr.','mai','juin','juil.','août','sept.','oct.','nov.','déc.'];
var COLORS=["#3DB8D4","#2D6A4F","#E76F51","#7B2D8B","#C1121F","#F4A261","#457B9D","#6D6875","#588157"];

function getMonday(d){var x=new Date(d);var day=x.getDay();x.setDate(x.getDate()-day+(day===0?-6:1));x.setHours(0,0,0,0);return x;}
function addDays(d,n){var x=new Date(d);x.setDate(x.getDate()+n);return x;}
function getWeekNum(d){var x=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));x.setUTCDate(x.getUTCDate()+4-(x.getUTCDay()||7));var y=new Date(Date.UTC(x.getUTCFullYear(),0,1));return Math.ceil((((x-y)/86400000)+1)/7);}
function pad2(n){return n<10?'0'+n:''+n;}
function fmtDate(d){return pad2(d.getDate())+'/'+pad2(d.getMonth()+1);}
function fmtLong(d){return d.getDate()+' '+MONTHS[d.getMonth()];}
function genId(){return Date.now()*1000+Math.floor(Math.random()*1000);}
function getInitials(name){return name.trim().split(/\s+/).map(function(s){return s[0];}).join('').slice(0,2).toUpperCase();}
function escapeHtml(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

var workers=JSON.parse(localStorage.getItem('agp_workers')||'[]');
var chantiers=JSON.parse(localStorage.getItem('agp_chantiers')||'[]');
var assign=JSON.parse(localStorage.getItem('agp_assign')||'{}');
var weekOff=0;
var activeTab='planning';
var editingWorker=null,editingChantier=null,editingAssign=null;
var sel={wColor:COLORS[0],cColor:COLORS[0],cStatus:'encours'};

function save(){
  localStorage.setItem('agp_workers',JSON.stringify(workers));
  localStorage.setItem('agp_chantiers',JSON.stringify(chantiers));
  localStorage.setItem('agp_assign',JSON.stringify(assign));
}

function getWeekDates(){
  var monday=getMonday(new Date());
  monday.setDate(monday.getDate()+weekOff*7);
  return DAYS.map(function(_,i){return addDays(monday,i);});
}
function changeWeek(n){weekOff+=n;render();}
function setWeek(n){weekOff=n;render();}

function switchTab(t){
  activeTab=t;
  document.getElementById('tab-planning').classList.toggle('active',t==='planning');
  document.getElementById('tab-agenda').classList.toggle('active',t==='agenda');
  document.getElementById('tab-planning-content').style.display=t==='planning'?'':'none';
  document.getElementById('tab-agenda-content').style.display=t==='agenda'?'':'none';
  document.getElementById('btn-worker').style.display=t==='planning'?'':'none';
  document.getElementById('btn-chantier').style.display=t==='planning'?'':'none';
}

// === WORKERS ===
function openWorkerModal(id){
  editingWorker=id||null;
  var w=id?workers.find(function(x){return x.id===id;}):null;
  document.getElementById('worker-h3').textContent=w?'Modifier ouvrier':'Nouvel ouvrier';
  document.getElementById('w-name').value=w?w.name:'';
  sel.wColor=w?w.color:COLORS[workers.length%COLORS.length];
  document.getElementById('w-del-btn').style.display=w?'':'none';
  buildColorPicker('w-colors','wColor');
  showOverlay('worker');
}
function saveWorker(){
  var name=document.getElementById('w-name').value.trim();
  if(!name){alert('Saisis un prénom');return;}
  if(editingWorker){
    var w=workers.find(function(x){return x.id===editingWorker;});
    if(w){w.name=name;w.initials=getInitials(name);w.color=sel.wColor;}
  }else{
    workers.push({id:genId(),name:name,initials:getInitials(name),color:sel.wColor});
  }
  save();closeOverlay('worker');render();
}
function deleteWorker(){
  if(!editingWorker)return;
  if(!confirm('Supprimer cet ouvrier ?'))return;
  workers=workers.filter(function(x){return x.id!==editingWorker;});
  Object.keys(assign).forEach(function(k){
    if(assign[k]&&assign[k].w){
      assign[k].w=assign[k].w.filter(function(wid){return wid!==editingWorker;});
      if(!assign[k].w.length)delete assign[k];
    }
  });
  save();closeOverlay('worker');render();
}
function countWorkerDays(wid){
  var dates=getWeekDates();
  var n=0;
  DAYS.forEach(function(_,i){
    var dKey=dates[i].toISOString().slice(0,10);
    chantiers.forEach(function(c){
      var cell=assign[dKey+'_'+c.id];
      if(cell&&cell.w&&cell.w.indexOf(wid)>=0)n++;
    });
  });
  return n;
}
function renderWorkers(){
  var el=document.getElementById('workers-row');
  if(!workers.length){
    el.innerHTML='<button class="wchip wchip-add" onclick="openWorkerModal()">＋ Ajouter ton premier ouvrier</button>';
    return;
  }
  el.innerHTML=workers.map(function(w){
    var n=countWorkerDays(w.id);
    return '<div class="wchip" onclick="openWorkerModal('+w.id+')">'
      +'<div class="wdot" style="background:'+w.color+'">'+w.initials+'</div>'
      +'<span class="wname">'+escapeHtml(w.name)+'</span>'
      +(n>0?'<span class="wdays">'+n+'j</span>':'')
      +'</div>';
  }).join('')+'<button class="wchip wchip-add" onclick="openWorkerModal()">＋</button>';
}

// === CHANTIERS ===
function openChantierModal(id){
  editingChantier=id||null;
  var c=id?chantiers.find(function(x){return x.id===id;}):null;
  document.getElementById('chantier-h3').textContent=c?'Modifier chantier':'Nouveau chantier';
  document.getElementById('c-name').value=c?c.name:'';
  document.getElementById('c-addr').value=c?(c.address||''):'';
  document.getElementById('c-notes').value=c?(c.notes||''):'';
  sel.cColor=c?c.color:COLORS[(chantiers.length+3)%COLORS.length];
  sel.cStatus=c?(c.status||'encours'):'encours';
  document.getElementById('c-del-btn').style.display=c?'':'none';
  buildColorPicker('c-colors','cColor');
  setStatusUI();
  showOverlay('chantier');
}
function setStatus(btn){sel.cStatus=btn.getAttribute('data-status');setStatusUI();}
function setStatusUI(){
  document.querySelectorAll('.status-row button').forEach(function(b){
    b.classList.toggle('sel',b.getAttribute('data-status')===sel.cStatus);
  });
}
function saveChantier(){
  var name=document.getElementById('c-name').value.trim();
  if(!name){alert('Saisis le nom du chantier');return;}
  var data={name:name,address:document.getElementById('c-addr').value.trim(),notes:document.getElementById('c-notes').value.trim(),color:sel.cColor,status:sel.cStatus};
  if(editingChantier){
    var c=chantiers.find(function(x){return x.id===editingChantier;});
    if(c)Object.assign(c,data);
  }else{
    data.id=genId();
    chantiers.push(data);
  }
  save();closeOverlay('chantier');render();
}
function deleteChantier(){
  if(!editingChantier)return;
  if(!confirm('Supprimer ce chantier ? Toutes les affectations seront perdues.'))return;
  Object.keys(assign).forEach(function(k){if(k.indexOf('_'+editingChantier)>0)delete assign[k];});
  chantiers=chantiers.filter(function(x){return x.id!==editingChantier;});
  save();closeOverlay('chantier');render();
}

// === ASSIGN ===
function openAssignModal(chantierId,dateKey,dayLbl,dateLbl){
  editingAssign={chantierId:chantierId,dateKey:dateKey};
  var c=chantiers.find(function(x){return x.id===chantierId;});
  var key=dateKey+'_'+chantierId;
  var cell=assign[key]||{w:[],s:'07:30',e:'17:00'};
  document.getElementById('assign-sub').textContent=(c?c.name+' · ':'')+dayLbl+' '+dateLbl;
  document.getElementById('a-start').value=cell.s||'07:30';
  document.getElementById('a-end').value=cell.e||'17:00';
  // Pré-sélectionner le bouton preset correspondant
  document.querySelectorAll('.time-presets button').forEach(function(b){b.classList.remove('sel');});
  var sv=cell.s||'07:30',ev=cell.e||'17:00';
  var match='';
  if(sv==='07:30'&&ev==='12:00')match='matin';
  else if(sv==='13:00'&&ev==='17:00')match='aprem';
  else if(sv==='07:30'&&ev==='17:00')match='journee';
  if(match){
    var btn=document.querySelector('.time-presets button[onclick*="'+match+'"]');
    if(btn)btn.classList.add('sel');
  }
  var wEl=document.getElementById('a-workers');
  if(!workers.length){
    wEl.innerHTML='<div style="text-align:center;padding:18px;color:var(--muted);font-size:13px;font-weight:600">Aucun ouvrier — ajoute-en d\'abord</div>';
  }else{
    wEl.innerHTML=workers.map(function(w){
      var picked=cell.w.indexOf(w.id)>=0;
      return '<div class="w-pick'+(picked?' sel':'')+'" data-wid="'+w.id+'" onclick="toggleWorkerPick(this)">'
        +'<div class="w-pick-dot" style="background:'+w.color+'">'+w.initials+'</div>'
        +'<div class="w-pick-name">'+escapeHtml(w.name)+'</div>'
        +'<div class="w-pick-check">'+(picked?'✓':'')+'</div>'
        +'</div>';
    }).join('');
  }
  showOverlay('assign');
}
function toggleWorkerPick(el){
  el.classList.toggle('sel');
  el.querySelector('.w-pick-check').textContent=el.classList.contains('sel')?'✓':'';
}
function setTimePreset(preset){
  var presets={
    matin:{s:'07:30',e:'12:00'},
    aprem:{s:'13:00',e:'17:00'},
    journee:{s:'07:30',e:'17:00'}
  };
  var p=presets[preset];
  if(!p)return;
  document.getElementById('a-start').value=p.s;
  document.getElementById('a-end').value=p.e;
  document.querySelectorAll('.time-presets button').forEach(function(b){b.classList.remove('sel');});
  var btn=document.querySelector('.time-presets button[onclick*="'+preset+'"]');
  if(btn)btn.classList.add('sel');
}
function saveAssign(){
  if(!editingAssign)return;
  var key=editingAssign.dateKey+'_'+editingAssign.chantierId;
  var picks=Array.from(document.querySelectorAll('#a-workers .w-pick.sel')).map(function(el){return parseInt(el.getAttribute('data-wid'));});
  var s=document.getElementById('a-start').value||'07:30';
  var e=document.getElementById('a-end').value||'17:00';
  if(picks.length){assign[key]={w:picks,s:s,e:e};}else{delete assign[key];}
  save();closeOverlay('assign');render();
}
function clearAssign(){
  if(!editingAssign)return;
  var key=editingAssign.dateKey+'_'+editingAssign.chantierId;
  delete assign[key];
  save();closeOverlay('assign');render();
}

// === GRID RENDER ===
function renderGrid(){
  var el=document.getElementById('grid-container');
  if(!chantiers.length){
    el.innerHTML='<div class="empty-msg"><div class="ei">🏗️</div><p>Aucun chantier</p><span style="font-size:13px;font-weight:500">Tape sur "+ Chantier" en haut pour commencer</span></div>';
    return;
  }
  var dates=getWeekDates();
  var sorted=[].concat(chantiers).sort(function(a,b){
    var order={encours:0,attente:1,termine:2};
    return (order[a.status]||0)-(order[b.status]||0);
  });
  var stLbl={encours:'En cours',attente:'En attente',termine:'Terminé'};
  var stCl={encours:'st-encours',attente:'st-attente',termine:'st-termine'};

  // Build grid
  var html='<div class="tgrid-wrap"><div class="tgrid">';
  // Header row
  html+='<div class="tg-hdr"><span class="tg-hdr-lbl">Chantier</span></div>';
  DAYS.forEach(function(d,i){
    html+='<div class="tg-hdr-day">'
      +'<div class="tg-hdr-day-lbl">'+d+'</div>'
      +'<div class="tg-hdr-day-date">'+fmtDate(dates[i])+'</div>'
      +'</div>';
  });
  // Body rows
  sorted.forEach(function(c){
    html+='<div class="tg-c-info" style="border-left-color:'+c.color+'">'
      +'<div class="tg-c-name">'+escapeHtml(c.name)+'</div>'
      +(c.address?'<div class="tg-c-addr">'+escapeHtml(c.address)+'</div>':'')
      +'<div class="tg-c-bot">'
      +'<span class="tg-status '+(stCl[c.status]||'st-encours')+'">'+(stLbl[c.status]||'En cours')+'</span>'
      +'<button class="tg-edit" onclick="openChantierModal('+c.id+')" title="Modifier">✎</button>'
      +(c.notes?'<span style="font-size:12px" title="'+escapeHtml(c.notes)+'">📝</span>':'')
      +'</div>'
      +'</div>';
    DAYS.forEach(function(d,i){
      var dKey=dates[i].toISOString().slice(0,10);
      var cell=assign[dKey+'_'+c.id]||{w:[]};
      var has=cell.w&&cell.w.length>0;
      html+='<div class="tg-cell'+(has?'':' empty')+'" onclick="openAssignModal('+c.id+',\''+dKey+'\',\''+d+'\',\''+fmtDate(dates[i])+'\')">';
      if(has){
        html+='<div class="tg-cell-dots">';
        cell.w.slice(0,4).forEach(function(wid){
          var w=workers.find(function(x){return x.id===wid;});
          if(w)html+='<div class="tg-cdot" style="background:'+w.color+'" title="'+escapeHtml(w.name)+'">'+w.initials+'</div>';
        });
        if(cell.w.length>4)html+='<div class="tg-cdot" style="background:#888">+'+(cell.w.length-4)+'</div>';
        html+='</div>'
          +'<div class="tg-cell-time">'+(cell.s||'')+'–<br>'+(cell.e||'')+'</div>';
        var names=cell.w.map(function(wid){var w=workers.find(function(x){return x.id===wid;});return w?w.name:'';}).filter(Boolean).slice(0,3).join(', ');
        if(names)html+='<div class="tg-cell-names">'+escapeHtml(names)+'</div>';
      }else{
        html+='<div class="tg-add">＋</div>';
      }
      html+='</div>';
    });
  });
  html+='</div></div>';
  el.innerHTML=html;
}

// === UI HELPERS ===
function showOverlay(name){document.getElementById('ov-'+name).classList.add('show');}
function closeOverlay(name){document.getElementById('ov-'+name).classList.remove('show');}
function buildColorPicker(elId,selKey){
  document.getElementById(elId).innerHTML=COLORS.map(function(c){
    return '<div class="color-pick'+(sel[selKey]===c?' sel':'')+'" style="background:'+c+'" onclick="pickColor(this,\''+elId+'\',\''+selKey+'\',\''+c+'\')"></div>';
  }).join('');
}
function pickColor(el,elId,selKey,c){
  sel[selKey]=c;
  document.querySelectorAll('#'+elId+' .color-pick').forEach(function(x){x.classList.remove('sel');});
  el.classList.add('sel');
}
document.addEventListener('click',function(e){
  if(e.target.classList&&e.target.classList.contains('overlay'))e.target.classList.remove('show');
});

function renderWeekTitle(){
  var dates=getWeekDates();
  var monday=dates[0];
  var sat=dates[5];
  var wn=getWeekNum(monday);
  document.getElementById('week-title').innerHTML='Semaine '+wn+' — '+fmtLong(monday)+' au '+fmtLong(sat)+' '+sat.getFullYear();
  document.getElementById('week-today').style.display=weekOff===0?'none':'inline';
}

function render(){
  renderWeekTitle();
  renderWorkers();
  renderGrid();
  // Footer impression
  var pf=document.getElementById('print-footer');
  if(pf){
    var d=new Date();
    pf.textContent='AG Peinture · Newflash SA · 1260 Nyon · Imprimé le '+pad2(d.getDate())+'.'+pad2(d.getMonth()+1)+'.'+d.getFullYear();
  }
}

window.initApp=function(){
  if(window._appInited)return;
  window._appInited=true;
  workers=JSON.parse(localStorage.getItem('agp_workers')||'[]');
  chantiers=JSON.parse(localStorage.getItem('agp_chantiers')||'[]');
  assign=JSON.parse(localStorage.getItem('agp_assign')||'{}');
  render();
};

setTimeout(function(){if(!window._appInited)window.initApp();},1500);
if(!window.fbLoad)window.initApp();
</script>

</body>
